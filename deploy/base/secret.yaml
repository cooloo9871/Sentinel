apiVersion: v1
kind: Secret
metadata:
  name: sentinel-credentials
  namespace: sentinel-system
type: Opaque
data:
  # Keys: username → bcrypt hash (base64-encoded)
  # jwt-secret: base64-encoded random string for JWT signing
  # Replace these placeholder values in the production overlay.
  admin: REPLACE_WITH_BASE64_BCRYPT_HASH
  jwt-secret: REPLACE_WITH_BASE64_JWT_SECRET
