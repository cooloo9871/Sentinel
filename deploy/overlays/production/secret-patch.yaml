apiVersion: v1
kind: Secret
metadata:
  name: sentinel-credentials
  namespace: sentinel-system
type: Opaque
data:
  # Generate bcrypt hash and base64-encode it:
  # python3 -c "import bcrypt,base64; h=bcrypt.hashpw(b'yourpassword',bcrypt.gensalt()); print(base64.b64encode(h).decode())"
  # Generate JWT secret:
  # openssl rand -base64 32 | base64
  admin: REPLACE_WITH_BASE64_BCRYPT_HASH
  jwt-secret: REPLACE_WITH_BASE64_JWT_SECRET
